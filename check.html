<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Track Your Order — Nervol Laundry</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0c1a10;color:#e0f0e8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#162a1c;border-radius:16px;padding:28px 24px;max-width:420px;width:100%;}
  h1{font-size:1.3rem;color:#4adc7a;margin-bottom:4px;}
  p{font-size:.82rem;color:#4a7a58;margin-bottom:20px;}
  input{width:100%;padding:12px 14px;background:#0c1a10;border:1px solid #2a4a32;border-radius:8px;color:#e0f0e8;font-size:1rem;margin-bottom:12px;}
  button{width:100%;padding:13px;background:#2a7a4a;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
  #result{margin-top:16px;background:#0c1a10;border-radius:10px;padding:14px;display:none;}
  .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a3a22;font-size:.85rem;}
  .lbl{color:#4a7a58;}
  .val{font-weight:600;color:#e0f0e8;}
  .status{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;}
  .pending{background:#92400e;color:#fcd34d;} .washing{background:#1e3a8a;color:#93c5fd;}
  .ready{background:#14532d;color:#86efac;} .collected{background:#374151;color:#d1d5db;}
  .delivery{background:#5b21b6;color:#c4b5fd;}
</style>
</head>
<body>
<div class="card">
  <h1>🧺 Track Your Order</h1>
  <p>Enter your Order ID or phone number below</p>
  <input type="text" id="q" placeholder="NL-2026-... or 0244123456" />
  <button onclick="check()">🔍 Check Status</button>
  <div id="result"></div>
</div>
<script>
async function check(){
  const q=document.getElementById('q').value.trim().toUpperCase();
  if(!q)return;
  const res=document.getElementById('result');
  res.style.display='block';res.innerHTML='<p style="color:#4a7a58;text-align:center;">Checking...</p>';
  try{
    const r=await fetch('https://firestore.googleapis.com/v1/projects/nervollaundry-8978e/databases/(default)/documents/orders/'+encodeURIComponent(q));
    if(r.ok){
      const d=await r.json();const f=d.fields;
      const status=f.status?.stringValue||'—';
      res.innerHTML='<div class="row"><span class="lbl">Order ID</span><span class="val">'+f.id?.stringValue+'</span></div>'
        +'<div class="row"><span class="lbl">Customer</span><span class="val">'+f.customerName?.stringValue+'</span></div>'
        +'<div class="row"><span class="lbl">Total</span><span class="val">GH₵'+parseFloat(f.total?.doubleValue||f.total?.integerValue||0).toFixed(2)+'</span></div>'
        +'<div class="row"><span class="lbl">Balance Due</span><span class="val">GH₵'+parseFloat(f.balanceDue?.doubleValue||f.balanceDue?.integerValue||0).toFixed(2)+'</span></div>'
        +'<div class="row"><span class="lbl">Status</span><span class="val"><span class="status '+status+'">'+status.charAt(0).toUpperCase()+status.slice(1)+'</span></span></div>';
    } else {
      res.innerHTML='<p style="color:#f87171;text-align:center;">Order not found. Check your Order ID.</p>';
    }
  }catch(e){res.innerHTML='<p style="color:#f87171;text-align:center;">Unable to connect. Try again.</p>';}
}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
</script>
</body>
</html>
