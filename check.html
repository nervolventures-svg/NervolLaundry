<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Track Your Order — Nervol Laundry</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0c1a10;color:#e0f0e8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;}
  .card{background:#162a1c;border-radius:16px;padding:28px 24px;max-width:460px;width:100%;}
  h1{font-size:1.3rem;color:#4adc7a;margin-bottom:4px;}
  p{font-size:.82rem;color:#4a7a58;margin-bottom:20px;}
  input{width:100%;padding:12px 14px;background:#0c1a10;border:1px solid #2a4a32;border-radius:8px;color:#e0f0e8;font-size:1rem;margin-bottom:12px;}
  button{width:100%;padding:13px;background:#2a7a4a;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
  #result{margin-top:16px;background:#0c1a10;border-radius:10px;padding:14px;display:none;}
  .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1a3a22;font-size:.85rem;}
  .lbl{color:#4a7a58;}
  .val{font-weight:600;color:#e0f0e8;}
  .status{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700;}
  .pending{background:#92400e;color:#fcd34d;} .washing{background:#1e3a8a;color:#93c5fd;}
  .ready{background:#14532d;color:#86efac;} .collected{background:#374151;color:#d1d5db;}
  .delivery{background:#5b21b6;color:#c4b5fd;}
</style>
  <!-- Firebase SDK for customer portal -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyDyqqoj11-IUfTJvTrxXCxLH_gFypxhFEM",
  authDomain: "nervollaundry-8978e.firebaseapp.com",
  projectId: "nervollaundry-8978e",
  storageBucket: "nervollaundry-8978e.firebasestorage.app",
  messagingSenderId: "359468253380",
  appId: "1:359468253380:web:a2b4a39f98920723380991"
};
    // Only initialize if not already done
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    window.db=firebase.firestore();
    console.log('Firestore initialized');
  </script>
</head>
<body>
<div class="card">
  <h1>🧺 Track Your Order</h1>
  <p>Enter your Order ID or phone number below</p>
  <input type="text" id="q" placeholder="NL-2026-... or 0244123456" />
  <button onclick="check()">🔍 Check Status</button>
  <div id="result"></div>
</div>

<!-- CUSTOMER COMPLAINT FORM -->
<div class="card">
  <h1 style="font-size:1rem;margin-bottom:4px;">⚠️ Lodge a Complaint</h1>
  <p>Have an issue with your order? Let us know below.</p>
  <div id="compFormArea">
    <div style="margin-bottom:10px;">
      <label style="font-size:.75rem;color:#4a7a58;display:block;margin-bottom:4px;">ORDER ID (if known)</label>
      <input type="text" id="cc-order" placeholder="NL-2026-..." style="width:100%;padding:10px 12px;background:#0c1a10;border:1px solid #2a4a32;border-radius:8px;color:#e0f0e8;font-size:.9rem;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:.75rem;color:#4a7a58;display:block;margin-bottom:4px;">YOUR NAME *</label>
      <input type="text" id="cc-name" placeholder="Your name" style="width:100%;padding:10px 12px;background:#0c1a10;border:1px solid #2a4a32;border-radius:8px;color:#e0f0e8;font-size:.9rem;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:.75rem;color:#4a7a58;display:block;margin-bottom:4px;">TYPE</label>
      <select id="cc-type" style="width:100%;padding:10px 12px;background:#0c1a10;border:1px solid #2a4a32;border-radius:8px;color:#e0f0e8;font-size:.9rem;box-sizing:border-box;">
        <option value="quality">Quality Issue</option>
        <option value="damage">Item Damaged</option>
        <option value="missing">Item Missing</option>
        <option value="delay">Delay</option>
        <option value="staff">Staff Conduct</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:.75rem;color:#4a7a58;display:block;margin-bottom:4px;">DESCRIPTION *</label>
      <textarea id="cc-desc" placeholder="Describe your issue..." rows="3" style="width:100%;padding:10px 12px;background:#0c1a10;border:1px solid #2a4a32;border-radius:8px;color:#e0f0e8;font-size:.9rem;box-sizing:border-box;resize:vertical;"></textarea>
    </div>
    <button onclick="submitCustomerComplaint()" style="width:100%;padding:13px;background:#c94a1a;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;">⚠️ Submit Complaint</button>
  </div>
  <div id="compSuccess" style="display:none;text-align:center;padding:16px;">
    <div style="font-size:2rem;margin-bottom:8px;">✅</div>
    <div style="font-weight:700;color:#4adc7a;">Complaint Received</div>
    <div style="font-size:.8rem;color:#4a7a58;margin-top:4px;">Thank you. Our team will review your complaint and get back to you.</div>
    <button onclick="document.getElementById('compSuccess').style.display='none';document.getElementById('compFormArea').style.display='block';" style="margin-top:12px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;">Submit Another</button>
  </div>
</div>

<script>
async function submitCustomerComplaint(){
  const name=(document.getElementById('cc-name')?.value||'').trim();
  const desc=(document.getElementById('cc-desc')?.value||'').trim();
  if(!name){alert('Please enter your name.');return;}
  if(!desc){alert('Please describe your issue.');return;}
  const btn=document.querySelector('#compFormArea button');
  if(btn){btn.disabled=true;btn.textContent='Submitting...';}
  const complaint={
    id:'comp'+Date.now(),
    orderId:(document.getElementById('cc-order')?.value||'').trim(),
    customerName:name,
    type:document.getElementById('cc-type')?.value||'other',
    description:desc,
    branchId:'',
    loggedBy:'Customer (self-service)',
    status:'open',
    source:'customer-portal',
    createdAt:new Date().toISOString()
  };
  try{
    // Use Firebase SDK (handles auth properly)
    const _dbC=window.db||db;
    if(typeof _dbC!=='undefined'){
      await _dbC.collection('complaints').doc(complaint.id).set(complaint);
      document.getElementById('compFormArea').style.display='none';
      document.getElementById('compSuccess').style.display='block';
      ['cc-order','cc-name','cc-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    } else {
      throw new Error('Firebase not loaded');
    }
  } catch(err){
    alert('No internet connection. Please try again when connected.');
  }
}
</script>

<script>
function renderOrderResult(f){
  const status=f.status?.stringValue||'—';
  const statusColor={pending:'#92400e',washing:'#1e3a8a',ready:'#14532d',collected:'#374151',delivery:'#5b21b6'}[status]||'#374151';
  const statusText={pending:'🕐 Pending',washing:'🫧 Washing',ready:'✅ Ready for Pickup',collected:'📦 Collected',delivery:'🏍 Out for Delivery'}[status]||status;
  return '<div class="row"><span class="lbl">Order ID</span><span class="val" style="font-size:.82rem;">'+(f.id?.stringValue||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">Customer</span><span class="val">'+(f.customerName?.stringValue||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">Branch</span><span class="val" style="font-size:.82rem;">'+(f.branchName?.stringValue||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">Summary</span><span class="val" style="font-size:.82rem;">'+(f.summary?.stringValue||'—')+'</span></div>'
    +'<div class="row"><span class="lbl">Total</span><span class="val">GH₵'+parseFloat(f.total?.doubleValue||f.total?.integerValue||0).toFixed(2)+'</span></div>'
    +'<div class="row"><span class="lbl">Balance Due</span><span class="val" style="color:'+(parseFloat(f.balanceDue?.doubleValue||f.balanceDue?.integerValue||0)>0?'#f87171':'#86efac')+';">GH₵'+parseFloat(f.balanceDue?.doubleValue||f.balanceDue?.integerValue||0).toFixed(2)+'</span></div>'
    +'<div class="row"><span class="lbl">Date</span><span class="val" style="font-size:.82rem;">'+(f.createdAt?.stringValue||'—').slice(0,10)+'</span></div>'
    +'<div class="row"><span class="lbl">Status</span><span class="val"><span class="status '+status+'" style="background:'+statusColor+'20;color:'+statusColor+';border:1px solid '+statusColor+'40;border-radius:20px;padding:3px 10px;font-size:.8rem;font-weight:700;">'+statusText+'</span></span></div>';
}

async function check(){
  const raw=document.getElementById('q').value.trim();
  if(!raw)return;
  const res=document.getElementById('result');
  res.style.display='block';
  res.innerHTML='<p style="color:#4a7a58;text-align:center;">🔍 Checking...</p>';

  // Detect if input is a phone number (digits, possibly starting with 0 or +)
  const isPhone=/^[0-9+\s]{7,15}$/.test(raw);
  const BASE='https://firestore.googleapis.com/v1/projects/nervollaundry-8978e/databases/(default)/documents';

  try{
    if(!isPhone){
      // Direct order ID lookup
      const q=raw.toUpperCase();
      const _db2=window.db||db;
      if(typeof _db2!=='undefined'){
        const doc=await _db2.collection('orders').doc(q).get();
        if(doc.exists){
          const d=doc.data();
          const f={};
          Object.keys(d).forEach(k=>{
            if(typeof d[k]==='string') f[k]={stringValue:d[k]};
            else if(typeof d[k]==='number') f[k]={doubleValue:d[k]};
            else if(typeof d[k]==='boolean') f[k]={booleanValue:d[k]};
          });
          res.innerHTML='<div style="margin-bottom:8px;font-size:.75rem;color:#4a7a58;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Order Details</div>'+renderOrderResult(f);
        } else {
          res.innerHTML='<p style="color:#f87171;text-align:center;">Order not found. Check your Order ID.</p>';
        }
      } else {
        // Fallback to REST
        const r=await fetch(BASE+'/orders/'+encodeURIComponent(q));
        if(r.ok){
          const d=await r.json();
          res.innerHTML='<div style="margin-bottom:8px;font-size:.75rem;color:#4a7a58;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Order Details</div>'+renderOrderResult(d.fields);
        } else {
          res.innerHTML='<p style="color:#f87171;text-align:center;">Order not found. Check your Order ID.</p>';
        }
      }
    } else {
      // Phone number — query Firestore with structuredQuery
      const phone=raw.replace(/\s/g,'');
      // Use Firebase SDK for phone search
      const _db=window.db||db;
      if(typeof _db!=='undefined'){
        const snap=await _db.collection('orders')
          .where('customerPhone','==',phone)
          .orderBy('createdAt','desc')
          .limit(10)
          .get();
        if(snap.empty){
          res.innerHTML='<p style="color:#f87171;text-align:center;">No orders found for that phone number.</p>';
          return;
        }
        let html='<div style="margin-bottom:8px;font-size:.75rem;color:#4a7a58;font-weight:700;text-transform:uppercase;letter-spacing:1px;">'+snap.size+' Order'+(snap.size>1?'s':'')+' Found</div>';
        snap.forEach((doc,i)=>{
          const d=doc.data();
          // Convert plain JS object to mock Firestore fields for renderOrderResult
          const f={};
          Object.keys(d).forEach(k=>{
            if(typeof d[k]==='string') f[k]={stringValue:d[k]};
            else if(typeof d[k]==='number') f[k]={doubleValue:d[k]};
            else if(typeof d[k]==='boolean') f[k]={booleanValue:d[k]};
          });
          html+=(i>0?'<div style="margin:12px 0 8px;border-top:1px solid #2a4a32;padding-top:8px;"></div>':'')+renderOrderResult(f);
        });
        res.innerHTML=html;
      } else {
        res.innerHTML='<p style="color:#f87171;text-align:center;">Could not connect. Please try your Order ID instead.</p>';
      }
    }
  }catch(e){
    console.error('Check error:',e);
    const msg=e?.code==='permission-denied'?'Access denied. Please contact us directly.'
      :e?.code==='unavailable'?'Service temporarily unavailable. Try again shortly.'
      :'Error: '+(e?.message||'Unknown error')+'. Please try again.';
    res.innerHTML='<p style="color:#f87171;text-align:center;">'+msg+'</p>';
  }
}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')check();});
</script>
</body>
</html>
